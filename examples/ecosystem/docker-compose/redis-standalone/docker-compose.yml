version: "3"

services:
  redis-standalone:
    image: "soldevelo/redis:6.2.16"
    container_name: redis-standalone
    environment:
      - REDIS_PORT_NUMBER=6379
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - ./data/node1:/bitnami/redis/data
    ports:
      - "6379:6379"
    restart: always