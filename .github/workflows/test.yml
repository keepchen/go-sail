name: "Test Coverage"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql-8:
        image: mysql:8.0.23
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: go_sail
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis-single:  # 可选，保留单机 Redis
        image: redis:6-alpine
        ports: ["6379:6379"]

      redis-cluster:
        image: ghcr.io/keepchen/redis-cluster:6.2.6
        ports:
          - 7000:7000
          - 7001:7001
          - 7002:7002
          - 7003:7003
          - 7004:7004
          - 7005:7005
          - 17000:17000
          - 17001:17001
          - 17002:17002
          - 17003:17003
          - 17004:17004
          - 17005:17005
        options: >-
          --health-cmd "redis-cli -p 7000 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      valkey-cluster:
        image: ghcr.io/keepchen/valkey-cluster:9
        ports:
          - 8000:8000
          - 8001:8001
          - 8002:8002
          - 8003:8003
          - 8004:8004
          - 8005:8005
          - 18000:18000
          - 18001:18001
          - 18002:18002
          - 18003:18003
          - 18004:18004
          - 18005:18005
        options: >-
          --health-cmd "redis-cli -p 8000 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      etcd:
        image: ghcr.io/keepchen/etcd:3.6.3
        env:
          ALLOW_NONE_AUTHENTICATION: "yes"
          ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
        ports: ["2379:2379"]

    steps:
      - uses: actions/checkout@v4

      # ── 验证各个服务是否 ready ────────────────────────────────
      - name: Verify services are ready
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools etcd-client

          # 等 healthcheck（通常 30-60s 内通过）
          sleep 10  # 小缓冲

          echo "Verifying etcd..."
          etcdctl endpoint health --endpoints=http://127.0.0.1:2379 || { echo "etcd failed"; exit 1; }
          etcdctl put foo bar && etcdctl get foo

          echo "Verifying Redis Cluster..."
          redis-cli -p 7000 cluster info | grep -q 'cluster_state:ok' || { echo "Redis Cluster not OK"; exit 1; }

          echo "Verifying Valkey Cluster..."
          redis-cli -p 8000 cluster info | grep -q 'cluster_state:ok' || { echo "Valkey Cluster not OK"; exit 1; }

          echo "All clusters ready!"

      # ── Go 测试 ────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: |
          set -e
          PACKAGES=$(go list ./... | grep -v '/examples/' | grep -v '/static/' | grep -v '/plugins/' | grep -v '/docker/')
          go test $PACKAGES -v -coverprofile=coverage.txt

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}